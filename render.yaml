services:
  - type: web
    name: trello-clone-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: trello-clone-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://trello-clone-web.vercel.app
    healthCheckPath: /api/health

databases:
  - name: trello-clone-db
    databaseName: trello_clone
    user: postgres
    plan: free
